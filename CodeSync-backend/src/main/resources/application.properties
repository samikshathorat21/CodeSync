# Server configuration
server.port=8080

# Database configuration (MySQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update

# JWT configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS}

# CORS configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Piston API configuration (Code Execution)
app.piston.url=${PISTON_URL}
app.piston.run-timeout-ms=${PISTON_TIMEOUT_MS}

# Invite configuration
app.invite.ttl-hours=${INVITE_TTL_HOURS}

# Email configuration (Resend)
app.email.provider=resend
app.email.resend-api-key=${RESEND_API_KEY:}
app.email.from="CodeSync "

# Rate limiting configuration
app.ratelimit.execute-per-minute=10
app.ratelimit.invite-per-hour=30
app.ratelimit.email-per-hour=20

# Actuator configuration
management.endpoints.web.exposure.include=health
